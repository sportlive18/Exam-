<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Methodology</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:white;
    }

    .container{
      width:100%;
      max-width:500px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius:20px;
      padding:30px;
      box-shadow:0 8px 25px rgba(0,0,0,0.3);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      font-size:2rem;
      color:#38bdf8;
    }

    .links{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .links a{
      text-decoration:none;
      background:#38bdf8;
      color:#0f172a;
      padding:15px;
      border-radius:12px;
      font-size:1.1rem;
      font-weight:bold;
      text-align:center;
      transition:0.3s;
    }

    .links a:hover{
      background:#0ea5e9;
      transform:translateY(-2px);
    }

    footer{
      margin-top:25px;
      text-align:center;
      font-size:0.9rem;
      color:#cbd5e1;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Exam Prep</h1>

    <div class="links">
      <a href="2025.html">2025</a>
      <a href="2024.html">2024</a>
      <a href="2023.html">2023</a>
      <a href="2022.html">2022</a>
    </div>

    <footer>
      © Exam Prep
    </footer>
  </div>

</body>
</html>
